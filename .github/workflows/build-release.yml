name: Build Release APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Add Capacitor Android platform
        run: npx cap add android

      - name: Sync web assets to Android
        run: npx cap copy android

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Configure signing and fix build.gradle
        run: |
          # Generate keystore
          echo "${{ secrets.KEYSTORE_BASE64 }}" > android/app/release.keystore

          # Patch app/build.gradle to add release signing config
          BUILD_FILE="android/app/build.gradle"
          python3 << 'PY'
          import re
          with open("android/app/build.gradle", "r") as f:
              content = f.read()

          signing_block = """
      signingConfigs {
          release {
              storeFile file('release.keystore')
              storePassword System.getenv("STORE_PASSWORD") ?: ""
              keyAlias System.getenv("KEY_ALIAS") ?: ""
              keyPassword System.getenv("KEY_PASSWORD") ?: ""
          }
      }
          """

          # Insert signingConfigs after defaultConfig block
          content = content.replace(
              "        }\n    }",
              "        }\n" + signing_block + "    }",
              1
          )

          # Add signingConfig to release buildType
          content = content.replace(
              "            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'\n        }",
              "            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'\n            signingConfig signingConfigs.release\n        }"
          )

          with open("android/app/build.gradle", "w") as f:
              f.write(content)

          print("build.gradle patched successfully")
          PY

      - name: Build Release APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease \
            -PSTORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }} \
            -PKEY_ALIAS=${{ secrets.KEY_ALIAS }} \
            -PKEY_PASSWORD=${{ secrets.KEY_PASSWORD }}
        env:
          STORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: List APK output
        run: ls -la android/app/build/outputs/apk/release/

      - name: Get version info
        id: version
        run: |
          VERSION=$(date +%Y%m%d-%H%M)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.0-${{ steps.version.outputs.version }}
          name: "音乐钢琴 v1.0.0 (${{ steps.version.outputs.version }})"
          body: |
            ## 🎹 音乐钢琴 - Android Release APK

            **构建时间**: ${{ steps.version.outputs.version }}

            ### 功能
            - 钢琴弹奏（两个八度）
            - 8 首内置曲谱（小星星、欢乐颂、两只老虎等）
            - 五线谱实时显示
            - 自动演奏 + 播放控制
            - 新手引导教程

            ### 安装方法
            下载 `app-release.apk` 传到安卓手机，开启「允许安装未知来源应用」后安装即可。
          files: |
            android/app/build/outputs/apk/release/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}